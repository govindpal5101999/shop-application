<div class="bill-preview-container">
    <!-- Bill Header -->
    <div class="bill-header">
        <h2>Bill Preview</h2>
        <p><strong>Bill No:</strong> {{ bill.number }}</p>
    </div>

    <!-- Item Table -->
    <table class="table table-striped">
        <thead>
            <tr>
                <th>#</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let item of bill.items; let i = index">
                <td>{{ i + 1 }}</td>
                <td>{{ item.name }}</td>
                <td>{{ item.quantity }}</td>
                <td>₹{{ item.price }}</td>
                <td>₹{{ item.quantity * item.price }}</td>
            </tr>
        </tbody>
    </table>

    <!-- Grand Total -->
    <div class="grand-total">
        <h4><strong>Grand Total: ₹{{ grandTotal }}</strong></h4>
    </div>

    <!-- Action Buttons -->
    <div class="no-print buttons">
        <button class="btn btn-secondary" (click)="goBack()">Back</button>
        <button class="btn btn-success" (click)="confirmBill()">Print</button>
    </div>
</div>
