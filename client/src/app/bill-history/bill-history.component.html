<div class="history-container">

    <h2>Sale Bill History</h2>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Bill No</th>
                <th>Date</th>
                <th>Total</th>
                <th>Items</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let bill of bills">
                <td>{{ bill.billNumber }}</td>
                <td>{{ bill.date | date:'short' }}</td>
                <td>₹{{ bill.grandTotal }}</td>
                <td>
                    <table class="table table-sm table-striped mb-0">
                        <thead>
                            <tr>
                                <th>Item Name</th>
                                <th>Quantity</th>
                                <th>Price</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let item of bill.items">
                                <td>{{ item.name }}</td>
                                <td>{{ item.quantity }}</td>
                                <td>₹{{ item.price }}</td>
                            </tr>
                        </tbody>
                    </table>
                </td>
                <td>
                    <button class="btn btn-primary btn-sm" (click)="printBill(bill.billNumber)">
                        Print
                    </button>
                </td>
            </tr>
        </tbody>
    </table>

</div>
