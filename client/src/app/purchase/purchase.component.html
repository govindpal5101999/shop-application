<div class="purchase-container">

    <h2>Checkout</h2>

    <div class="checkout-grid">

        <!-- LEFT SIDE - CART ITEMS -->
        <div class="cart-section">

            <div class="cart-item" *ngFor="let item of cartService.getCart()">

                <div>
                    <h4>{{ item.product.name }}</h4>
                    <p>₹ {{ item.price }}</p>
                </div>

                <div class="qty-controls">
                    <button (click)="cartService.decrease(item.id)">−</button>
                    <span>{{ item.quantity }}</span>
                    <button (click)="cartService.increase(item.id)">+</button>
                </div>

                <div>
                    ₹ {{ item.price * item.quantity }}
                </div>

                <button class="remove-btn" (click)="cartService.remove(item.id)">
                    ✕
                </button>

            </div>

        </div>

        <!-- RIGHT SIDE - SUMMARY -->
        <div class="summary-section">

            <h3>Order Summary</h3>

            <div class="summary-row">
                <span>Subtotal</span>
                <span>₹ {{ subtotal }}</span>
            </div>

            <div class="summary-row">
                <span>Tax (5%)</span>
                <span>₹ {{ tax }}</span>
            </div>

            <hr>

            <div class="summary-row total">
                <span>Total</span>
                <span>₹ {{ total }}</span>
            </div>

            <h4>Payment Mode</h4>

            <select [(ngModel)]="paymentMode">
                <option value="COD">Cash on Delivery</option>
                <option value="CARD">Credit / Debit Card</option>
                <option value="UPI">UPI</option>
            </select>

            <button class="place-order-btn" (click)="placeOrder()">
                Place Order
            </button>

        </div>

    </div>

</div>
